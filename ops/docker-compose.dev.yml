# Development environment for synapse-admin
# Starts a local Synapse server and the synapse-admin Vite dev server with HMR.
# Source code is mounted directly — changes reflect instantly, no rebuild needed.
#
# First-time setup:
#   cd ops && docker-compose -f docker-compose.dev.yml up -d
#   ./generate-admin.sh                       # create admin user
#   open http://localhost:5173
#
# Login: http://localhost:8008 (homeserver URL), admin / adminpassword

services:
  synapse:
    build:
      context: .
      dockerfile: Dockerfile.synapse
    image: synapse-admin-dev-synapse:local
    container_name: synapse-admin-dev-synapse
    ports:
      - "8008:8008"
    volumes:
      - ./synapse-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/_matrix/client/versions', timeout=5)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  synapse-admin-dev:
    image: node:22-alpine
    container_name: synapse-admin-dev
    working_dir: /app
    command: >
      sh -c "
        echo 'nodeLinker: node-modules' > .yarnrc.yml &&
        echo 'yarnPath: .yarn/releases/yarn-4.13.0.cjs' >> .yarnrc.yml &&
        yarn install --network-timeout=300000 &&
        yarn start --host 0.0.0.0
      "
    ports:
      - "5173:5173"
    volumes:
      - ..:/app
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
